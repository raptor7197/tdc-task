services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-tdc-matchmaker-secret-key-2024}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PORT=3001
    volumes:
      - server_data:/app/dist/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server_data:
